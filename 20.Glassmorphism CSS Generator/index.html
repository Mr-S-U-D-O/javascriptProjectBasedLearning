<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism CSS Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="page-header">
        <h1>Glassmorphism CSS Generator</h1>
        <div class="theme-switcher">
            <input type="checkbox" id="theme-toggle" class="sr-only">
            <label for="theme-toggle" class="toggle-label">
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
            </label>
        </div>
    </header>

    <main class="glass-generator">
        <!-- 
            This is the left column for all the controls. Each control is a simple
            slider or color picker for intuitive use.
        -->
        <section class="controls-panel">
            <div class="card">
                <div class="control-group">
                    <label for="blur">Blur <span id="blur-value">10px</span></label>
                    <input type="range" id="blur" min="0" max="40" value="10" step="1">
                </div>
                <div class="control-group">
                    <label for="transparency">Transparency <span id="transparency-value">0.2</span></label>
                    <input type="range" id="transparency" min="0" max="1" value="0.2" step="0.01">
                </div>
                <div class="control-group">
                    <label for="color">Color Tint</label>
                    <input type="color" id="color" value="#ffffff">
                </div>
                <div class="control-group">
                    <label for="border-width">Border Width <span id="border-width-value">1px</span></label>
                    <input type="range" id="border-width" min="0" max="10" value="1" step="1">
                </div>
                 <div class="control-group">
                    <label for="border-opacity">Border Opacity <span id="border-opacity-value">0.3</span></label>
                    <input type="range" id="border-opacity" min="0" max="1" value="0.3" step="0.01">
                </div>
            </div>
        </section>
        
        <!-- 
            This is the right column for the live preview and the generated code.
            The preview-area has the background image, and the glass-box sits on top.
        -->
        <section class="visual-panel">
            <div id="preview-area" class="preview-area card">
                <!-- I'm adding some decorative circles in the background to make the blur effect more apparent -->
                <div class="bg-shape shape1"></div>
                <div class="bg-shape shape2"></div>

                <div id="glass-box" class="glass-box">
                    <h3>Glass Effect</h3>
                    <p>This is the element you are styling.</p>
                </div>
            </div>
            <div class="code-output-card card">
                <pre><code id="code-output"></code></pre>
                <button id="copy-button" class="button-primary button-full-width">Copy CSS</button>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <p>Coded by S.U.D.O.</p>
        <div class="social-links">
            <a href="https://github.com" target="_blank" aria-label="GitHub"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>
            <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>
        </div>
    </footer>
    
    <style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;}</style>

    <script>
    // --- I. STATE & DOM SELECTION ---
    // I'm using a state object to hold the current values of our generator.
    const state = {
        blur: 10,
        transparency: 0.2,
        color: '#ffffff',
        borderWidth: 1,
        borderOpacity: 0.3
    };

    // I'm getting references to all the elements I need to interact with.
    const controls = {
        blur: document.getElementById('blur'),
        transparency: document.getElementById('transparency'),
        color: document.getElementById('color'),
        borderWidth: document.getElementById('border-width'),
        borderOpacity: document.getElementById('border-opacity'),
    };

    const valueLabels = {
        blur: document.getElementById('blur-value'),
        transparency: document.getElementById('transparency-value'),
        borderWidth: document.getElementById('border-width-value'),
        borderOpacity: document.getElementById('border-opacity-value'),
    };

    const glassBox = document.getElementById('glass-box');
    const codeOutput = document.getElementById('code-output');
    const copyButton = document.getElementById('copy-button');
    const themeToggle = document.getElementById('theme-toggle');

    // --- II. CORE FUNCTIONS ---

    /**
     * A helper function to convert a hex color and an alpha value into an rgba string.
     * This is necessary because the `backdrop-filter` needs a background with transparency.
     */
    function hexToRgba(hex, alpha) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
    }

    /**
     * My main render function. It takes the current state and updates the UI.
     */
    function render() {
        const rgbaColor = hexToRgba(state.color, state.transparency);
        const borderRgbaColor = `rgba(255, 255, 255, ${state.borderOpacity})`;

        // 1. Apply styles to the glass box for a live preview.
        glassBox.style.backgroundColor = rgbaColor;
        glassBox.style.backdropFilter = `blur(${state.blur}px)`;
        glassBox.style.webkitBackdropFilter = `blur(${state.blur}px)`; // For Safari
        glassBox.style.border = `${state.borderWidth}px solid ${borderRgbaColor}`;
        
        // 2. Update the code output block.
        codeOutput.textContent = `/* Glassmorphism */
background: ${rgbaColor};
box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
backdrop-filter: blur(${state.blur}px);
-webkit-backdrop-filter: blur(${state.blur}px);
border-radius: 10px;
border: ${state.borderWidth}px solid ${borderRgbaColor};`;

        // 3. Update the value labels next to the sliders.
        valueLabels.blur.textContent = `${state.blur}px`;
        valueLabels.transparency.textContent = state.transparency.toFixed(2);
        valueLabels.borderWidth.textContent = `${state.borderWidth}px`;
        valueLabels.borderOpacity.textContent = state.borderOpacity.toFixed(2);
    }
    
    // --- III. EVENT LISTENERS ---

    // Listening for any input change on the controls panel.
    document.querySelector('.controls-panel').addEventListener('input', (e) => {
        if (e.target.id in state) {
            // I'm using parseFloat for sliders to ensure they are numbers.
            const value = e.target.type === 'range' ? parseFloat(e.target.value) : e.target.value;
            state[e.target.id] = value;
            render();
        }
    });

    copyButton.addEventListener('click', () => {
        navigator.clipboard.writeText(codeOutput.textContent).then(() => {
            const originalText = copyButton.textContent;
            copyButton.textContent = 'Copied!';
            setTimeout(() => { copyButton.textContent = originalText; }, 1500);
        });
    });

    // --- IV. THEME MANAGEMENT ---
    
    function applyTheme(theme) {
        if (theme === 'dark') {
            document.body.classList.add('dark-mode');
            themeToggle.checked = true;
        } else {
            document.body.classList.remove('dark-mode');
            themeToggle.checked = false;
        }
    }
    
    themeToggle.addEventListener('change', () => {
        const newTheme = themeToggle.checked ? 'dark' : 'light';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    });

    // --- V. INITIALIZATION ---

    // Set the initial values of the sliders from the state.
    for (const key in controls) {
        controls[key].value = state[key];
    }
    
    // Check for saved theme preference on load.
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    
    if (savedTheme) {
        applyTheme(savedTheme);
    } else if (prefersDark) {
        applyTheme('dark');
    }

    // Initial render to set everything up.
    render();
    </script>
</body>
</html>
