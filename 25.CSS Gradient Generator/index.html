<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Gradient Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="page-header">
        <h1>CSS Gradient Generator</h1>
        <div class="theme-switcher">
            <input type="checkbox" id="theme-toggle" class="sr-only">
            <label for="theme-toggle" class="toggle-label">
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
            </label>
        </div>
    </header>

    <main class="gradient-generator">
        <!-- Controls Panel -->
        <section class="controls-panel">
            <div class="card">
                <div class="card-header">
                    <h2>Settings</h2>
                    <button id="random-btn" class="button-small">Randomize</button>
                </div>
                
                <div class="control-row">
                    <div class="control-group">
                        <label for="type">Type</label>
                        <select id="type">
                            <option value="linear">Linear</option>
                            <option value="radial">Radial</option>
                        </select>
                    </div>
                    <div class="control-group" id="angle-group">
                        <label for="angle">Angle <span id="angle-val">90deg</span></label>
                        <div class="angle-input-wrapper">
                            <input type="range" id="angle" min="0" max="360" value="90">
                        </div>
                    </div>
                </div>

                <div class="card-header separator">
                    <h2>Color Stops</h2>
                    <button id="add-stop-btn" class="button-icon" title="Add Stop">+</button>
                </div>
                
                <!-- This list is populated by JS -->
                <div id="stops-list" class="stops-list"></div>
            </div>
        </section>
        
        <!-- Visual Panel -->
        <section class="visual-panel">
            <div class="card preview-container">
                <div id="gradient-preview" class="gradient-preview"></div>
            </div>

            <div class="card code-output-card">
                <pre><code id="code-output">background: linear-gradient(90deg, #5e54d6 0%, #f43f5e 100%);</code></pre>
                <button id="copy-button" class="button-primary button-full-width">Copy CSS</button>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <p>Coded by S.U.D.O.</p>
        <div class="social-links">
            <a href="https://github.com" target="_blank" aria-label="GitHub"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>
            <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>
        </div>
    </footer>
    
    <style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;}</style>

    <script>
    // --- I. STATE MANAGEMENT ---
    const state = {
        type: 'linear', // 'linear' or 'radial'
        angle: 90,
        stops: [
            { color: '#5e54d6', percent: 0, id: 1 },
            { color: '#f43f5e', percent: 100, id: 2 }
        ]
    };

    // --- II. DOM SELECTION ---
    const dom = {
        preview: document.getElementById('gradient-preview'),
        output: document.getElementById('code-output'),
        stopsList: document.getElementById('stops-list'),
        angleInput: document.getElementById('angle'),
        angleVal: document.getElementById('angle-val'),
        angleGroup: document.getElementById('angle-group'),
        typeSelect: document.getElementById('type'),
        addBtn: document.getElementById('add-stop-btn'),
        randomBtn: document.getElementById('random-btn'),
        copyBtn: document.getElementById('copy-button'),
        themeToggle: document.getElementById('theme-toggle'),
    };

    // --- III. CORE FUNCTIONS ---

    function generateCSS() {
        // Sort stops by percentage so the CSS is valid and logical
        const sortedStops = [...state.stops].sort((a, b) => a.percent - b.percent);
        
        const stopsString = sortedStops
            .map(stop => `${stop.color} ${stop.percent}%`)
            .join(', ');

        let css = '';
        if (state.type === 'linear') {
            css = `linear-gradient(${state.angle}deg, ${stopsString})`;
        } else {
            css = `radial-gradient(circle, ${stopsString})`;
        }
        return css;
    }

    function render() {
        const css = generateCSS();
        
        // Update Preview
        dom.preview.style.background = css;
        
        // Update Code
        dom.output.textContent = `background: ${css};`;
        
        // Update Inputs
        dom.angleVal.textContent = `${state.angle}deg`;
        if (state.type === 'radial') {
            dom.angleGroup.style.opacity = '0.5';
            dom.angleGroup.style.pointerEvents = 'none';
        } else {
            dom.angleGroup.style.opacity = '1';
            dom.angleGroup.style.pointerEvents = 'auto';
        }

        renderStopsList();
    }

    function renderStopsList() {
        dom.stopsList.innerHTML = '';
        
        state.stops.forEach((stop, index) => {
            const row = document.createElement('div');
            row.className = 'stop-row';
            
            // Color Picker
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.value = stop.color;
            colorInput.className = 'stop-color';
            colorInput.addEventListener('input', (e) => {
                stop.color = e.target.value;
                render(); // Re-render visual only
            });

            // Percent Slider
            const sliderContainer = document.createElement('div');
            sliderContainer.className = 'stop-slider-container';
            
            const slider = document.createElement('input');
            slider.type = 'range';
            slider.min = 0;
            slider.max = 100;
            slider.value = stop.percent;
            slider.className = 'stop-slider';
            
            const label = document.createElement('span');
            label.className = 'stop-label';
            label.textContent = `${stop.percent}%`;

            slider.addEventListener('input', (e) => {
                stop.percent = parseInt(e.target.value);
                label.textContent = `${stop.percent}%`;
                render();
            });

            sliderContainer.append(slider, label);

            // Delete Button (only if more than 2 stops)
            const delBtn = document.createElement('button');
            delBtn.innerHTML = '&times;';
            delBtn.className = 'stop-delete';
            if (state.stops.length <= 2) {
                delBtn.disabled = true;
                delBtn.style.opacity = '0.3';
                delBtn.style.cursor = 'not-allowed';
            }
            delBtn.addEventListener('click', () => {
                if (state.stops.length > 2) {
                    state.stops = state.stops.filter(s => s.id !== stop.id);
                    render();
                }
            });

            row.append(colorInput, sliderContainer, delBtn);
            dom.stopsList.appendChild(row);
        });
    }

    function getRandomColor() {
        return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
    }

    function randomize() {
        state.angle = Math.floor(Math.random() * 360);
        dom.angleInput.value = state.angle;
        
        state.stops = [
            { color: getRandomColor(), percent: 0, id: Date.now() },
            { color: getRandomColor(), percent: 100, id: Date.now() + 1 }
        ];
        render();
    }

    // --- IV. EVENT LISTENERS ---

    dom.typeSelect.addEventListener('change', (e) => {
        state.type = e.target.value;
        render();
    });

    dom.angleInput.addEventListener('input', (e) => {
        state.angle = e.target.value;
        render();
    });

    dom.addBtn.addEventListener('click', () => {
        // Add a new stop in the middle
        const newId = Date.now();
        state.stops.push({ color: getRandomColor(), percent: 50, id: newId });
        render();
    });

    dom.randomBtn.addEventListener('click', randomize);

    dom.copyBtn.addEventListener('click', () => {
        navigator.clipboard.writeText(dom.output.textContent).then(() => {
            const originalText = dom.copyBtn.textContent;
            dom.copyBtn.textContent = 'Copied!';
            setTimeout(() => { dom.copyBtn.textContent = originalText; }, 1500);
        });
    });

    // Theme Management
    function applyTheme(theme) {
        document.body.classList.toggle('dark-mode', theme === 'dark');
        dom.themeToggle.checked = theme === 'dark';
    }
    
    dom.themeToggle.addEventListener('change', () => {
        const newTheme = dom.themeToggle.checked ? 'dark' : 'light';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    });

    // Init
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));
    
    render();

    </script>
</body>
</html>
