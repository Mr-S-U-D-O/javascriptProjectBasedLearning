<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.U.D.O | Project Hub</title>
    <link rel="stylesheet" href="hub.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="hub-header">
            <div class="logo">S.U.D.O / HUB</div>
            <div class="stats">
                <span id="total-projects">00</span> PROJECTS | 
                <span id="total-categories">00</span> GROUPS
            </div>
        </header>

        <div class="search-container">
            <span class="prompt">S.U.D.O></span>
            <input type="text" id="search-input" placeholder="[ Search projects... ]" autocomplete="off" spellcheck="false">
            <span class="cursor"></span>
        </div>

        <main id="hub-main">
            <!-- Groups will be injected here -->
            <div class="loading">SCANNING SYSTEM...</div>
        </main>

        <div id="stats-dashboard" style="display: none;">
            <div class="stats-header">
                <h2>[ SYSTEM STATS ]</h2>
                <button id="close-stats" class="theme-btn">EXIT_STATS</button>
            </div>
            
            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-label">TOTAL PROJECTS</span>
                    <span class="stat-value" id="stat-total-projects">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">LINES OF CODE</span>
                    <span class="stat-value" id="stat-loc">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">GROUPS</span>
                    <span class="stat-value" id="stat-categories">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">LONGEST PROJECT</span>
                    <span class="stat-value" id="stat-longest-project">--</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">LATEST PROJECT</span>
                    <span class="stat-value" id="stat-latest-project">--</span>
                </div>
            </div>
            
            <h3>LANGUAGE DISTRIBUTION</h3>
            <div class="stats-graphs" id="stats-graphs">
                <!-- Language bars built by JS -->
            </div>
        </div>

        <footer class="hub-footer">
            <div class="readme-link">
                <a href="../README.md">VIEW_README.md</a>
            </div>
            <div class="theme-controls">
                <button class="theme-btn active" data-theme="modern">MODERN</button>
                <button class="theme-btn" data-theme="matrix">MATRIX</button>
                <button class="theme-btn" data-theme="paper">PAPER</button>
            </div>
            <div class="version">BUILD_V1.1</div>
        </footer>
    </div>
    <script src="hub.js"></script>
</body>
</html>
