<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My javascript weather application | Project 1</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div class="dashboardContainer">
      <!-- Header with Search -->
      <header class="header">
        <div class="searchBarContainer">
          <input
            type="text"
            placeholder="Search city..."
            spellcheck="false"
          />
          <button title="search" class="searchBarBtn" type="button">
            <img src="images/search.png" alt="search" />
          </button>
        </div>
        <div class="lastUpdated">Last updated: --:--</div>
      </header>

      <!-- Bento Grid Layout -->
      <main class="gridContainer">
        <!-- Main Weather Highlight -->
        <div class="card mainWeather glass">
          <div class="weatherIcon">
            <img src="images/rain.png" alt="weather icon" class="weatherImageIcon" />
          </div>
          <div class="mainInfo">
            <h1 class="tempTemperatureDisplay">--°C</h1>
            <p class="feelsLike">Feels like --°C</p>
            <h2 class="cityNameDisplay">--</h2>
            <p class="weatherDescription">--</p>
          </div>
        </div>

        <!-- Extra Details Grid -->
        <div class="card humidityCard glass">
          <img src="images/humidity.png" alt="humidity" />
          <div class="detailInfo">
            <p>Humidity</p>
            <h3 class="humidity">--%</h3>
          </div>
        </div>

        <div class="card windCard glass">
          <img src="images/wind.png" alt="wind" />
          <div class="detailInfo">
            <p>Wind Speed</p>
            <h3 class="wind">-- km/h</h3>
          </div>
        </div>

        <div class="card pressureCard glass">
          <div class="detailInfo">
            <p>Pressure</p>
            <h3 class="pressure">-- hPa</h3>
          </div>
        </div>

        <div class="card visibilityCard glass">
          <div class="detailInfo">
            <p>Visibility</p>
            <h3 class="visibility">-- km</h3>
          </div>
        </div>

        <div class="card airQualityCard glass">
          <div class="detailInfo">
            <p>Air Quality</p>
            <h3 class="airQuality">--</h3>
          </div>
        </div>

        <div class="card sunriseCard glass">
          <div class="detailInfo">
            <p>Sunrise</p>
            <h3 class="sunrise">--:--</h3>
          </div>
        </div>

        <div class="card sunsetCard glass">
          <div class="detailInfo">
            <p>Sunset</p>
            <h3 class="sunset">--:--</h3>
          </div>
        </div>

        <!-- 5-Day Forecast -->
        <div class="card forecastCard glass">
          <h3>5-Day Forecast</h3>
          <div class="forecastList">
            <!-- Forecast items will be injected here -->
          </div>
        </div>
      </main>
    </div>
    <script src="javascript/index.js"></script>
  </body>
</html>
