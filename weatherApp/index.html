<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My javascript weather application | Project 1</title>
    <link rel="stylesheet" href="css/index.css" />
  </head>
  <body>
    <div class="cardContainer">
      <!--Start: search bar container-->
      <div class="searchBarContainer">
        <input
          type="text"
          placeholder="Enter your location..."
          spellcheck="false"
        />
        <button title="btn" class="searchBarBtn" type="button">
          <img title="img" src="images/search.png" />
        </button>
      </div>
      <!--End: search bar container-->
      <!--Start: weather details container-->
      <div class="weatherDetailsContainer">
        <img src="images/rain.png" alt="weatherImageIcon" class="weatherImageIcon" />
        <h1 class="tempTemperatureDisplay">22°C</h1>
        <h2 class="city">Matatiele</h2>
        <div class="temperatureDetails">
          <div class="extraDetailsCol">
            <img src="images/humidity.png" alt="#" />
            <div><p class="humidity">50%</p><p>Humidity</p></div>
          </div>
          <div class="extraDetailsCol">
            <img src="images/wind.png" alt="#" />
            <div><p class="wind">15km/h</p><p>Wind Speed</p></div>
          </div>
        </div>
      </div>
      <!--End: weather details container-->
    </div>
  </body>
</html>
