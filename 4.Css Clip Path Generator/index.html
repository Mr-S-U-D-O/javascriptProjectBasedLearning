<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS clip-path Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="page-header">
        <h1>Interactive CSS clip-path Generator</h1>
        <div class="theme-switcher">
            <input type="checkbox" id="theme-toggle" class="sr-only">
            <label for="theme-toggle" class="toggle-label">
                <span class="toggle-track"></span>
                <span class="toggle-thumb"></span>
            </label>
        </div>
    </header>

    <main class="clip-path-generator">
        <!-- 
            The left panel is for controls. I'm putting the presets and the code
            output here, as they are the primary user interactions besides the visual editor.
        -->
        <section class="controls-panel">
            <div class="card">
                <div class="card-header">
                    <h2>Presets</h2>
                </div>
                <div id="presets-container" class="presets-grid">
                    <!-- Preset buttons will be added here by JavaScript -->
                </div>
            </div>
            <div class="card code-output-card">
                <pre><code id="code-output"></code></pre>
                <button id="copy-button" class="button-primary button-full-width">Copy CSS</button>
            </div>
        </section>
        
        <!-- 
            The right panel is the main interactive area. It contains a wrapper that
            holds both the image to be clipped and an SVG overlay for the draggable points.
        -->
        <section class="visual-panel">
            <div id="preview-area" class="preview-area card">
                <img id="clipped-element" src="https://images.unsplash.com/photo-1554415707-6e8cfc93fe23?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=1170&q=80" alt="Work desk with laptop">
                
                <!-- 
                    I'm using an SVG overlay because it's the perfect tool for creating
                    draggable points and drawing lines between them with high performance.
                -->
                <svg id="svg-overlay" class="svg-overlay"></svg>
            </div>
        </section>
    </main>

    <footer class="page-footer">
        <p>Coded by S.U.D.O.</p>
        <div class="social-links">
            <a href="https://github.com" target="_blank" aria-label="GitHub"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.91 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg></a>
            <a href="https://linkedin.com" target="_blank" aria-label="LinkedIn"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg></a>
        </div>
    </footer>
    
    <style>.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0;}</style>

    <script>
    // --- I. STATE & SETUP ---
    // The state object holds the core data: the vertices of our polygon.
    const state = {
        points: [], // An array of {x, y} objects in percentage
        activePointIndex: null, // The index of the point being dragged
    };
    
    // I'm defining the presets here. Each is an array of points.
    const presets = {
        'Triangle': [{x: 50, y: 0}, {x: 100, y: 100}, {x: 0, y: 100}],
        'Trapezoid': [{x: 20, y: 0}, {x: 80, y: 0}, {x: 100, y: 100}, {x: 0, y: 100}],
        'Pentagon': [{x: 50, y: 0}, {x: 100, y: 38}, {x: 82, y: 100}, {x: 18, y: 100}, {x: 0, y: 38}],
        'Star': [{x: 50, y: 0}, {x: 61, y: 35}, {x: 98, y: 35}, {x: 68, y: 57}, {x: 79, y: 91}, {x: 50, y: 70}, {x: 21, y: 91}, {x: 32, y: 57}, {x: 2, y: 35}, {x: 39, y: 35}],
        'Arrow': [{x: 50, y: 0}, {x: 100, y: 50}, {x: 50, y: 100}, {x: 50, y: 75}, {x: 0, y: 75}, {x: 0, y: 25}, {x: 50, y: 25}],
    };

    // --- II. DOM ELEMENT SELECTION ---
    const clippedElement = document.getElementById('clipped-element');
    const codeOutput = document.getElementById('code-output');
    const copyButton = document.getElementById('copy-button');
    const presetsContainer = document.getElementById('presets-container');
    const previewArea = document.getElementById('preview-area');
    const svgOverlay = document.getElementById('svg-overlay');
    const themeToggle = document.getElementById('theme-toggle');

    // --- III. CORE FUNCTIONS ---

    /**
     * My main render function. It syncs the entire UI with the current state.
     */
    function render() {
        const pointsString = state.points.map(p => `${p.x}% ${p.y}%`).join(', ');
        const clipPathValue = `polygon(${pointsString})`;

        // 1. Apply the clip-path to the image.
        clippedElement.style.clipPath = clipPathValue;
        
        // 2. Update the code output.
        codeOutput.textContent = `clip-path: ${clipPathValue};`;

        // 3. Re-draw the SVG overlay (points and lines).
        svgOverlay.innerHTML = ''; // Clear previous SVG elements
        
        if (state.points.length > 1) {
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            const svgPoints = state.points.map(p => `${p.x},${p.y}`).join(' ');
            polygon.setAttribute('points', svgPoints);
            // I'm using 'vector-effect: non-scaling-stroke' so the lines don't get fat.
            polygon.setAttribute('vector-effect', 'non-scaling-stroke');
            svgOverlay.appendChild(polygon);
        }

        state.points.forEach((p, index) => {
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', `${p.x}%`);
            circle.setAttribute('cy', `${p.y}%`);
            circle.setAttribute('r', '5'); // Radius in pixels
            circle.setAttribute('class', 'draggable-point');
            circle.dataset.index = index;
            svgOverlay.appendChild(circle);
        });
    }

    function loadPreset(name) {
        // I'm using structuredClone to make a deep copy, so I don't modify the original preset.
        state.points = structuredClone(presets[name]);
        render();
    }

    // --- IV. EVENT LISTENERS ---

    svgOverlay.addEventListener('mousedown', (e) => {
        if (e.target.classList.contains('draggable-point')) {
            state.activePointIndex = parseInt(e.target.dataset.index, 10);
            
            // I'm adding the move and up listeners to the window so the drag
            // continues even if the mouse leaves the SVG area.
            window.addEventListener('mousemove', handleDrag);
            window.addEventListener('mouseup', stopDrag);
        }
    });

    function handleDrag(e) {
        if (state.activePointIndex === null) return;
        
        // I need to get the mouse coordinates relative to the preview area.
        const bounds = previewArea.getBoundingClientRect();
        const x = e.clientX - bounds.left;
        const y = e.clientY - bounds.top;

        // Convert pixel coordinates to percentages.
        let xPercent = (x / bounds.width) * 100;
        let yPercent = (y / bounds.height) * 100;
        
        // I'm clamping the values between 0 and 100 to keep points inside the box.
        xPercent = Math.max(0, Math.min(100, xPercent));
        yPercent = Math.max(0, Math.min(100, yPercent));

        state.points[state.activePointIndex] = { x: xPercent, y: yPercent };
        render();
    }

    function stopDrag() {
        state.activePointIndex = null;
        window.removeEventListener('mousemove', handleDrag);
        window.removeEventListener('mouseup', stopDrag);
    }
    
    presetsContainer.addEventListener('click', (e) => {
        if (e.target.tagName === 'BUTTON') {
            loadPreset(e.target.dataset.preset);
        }
    });

    copyButton.addEventListener('click', () => {
        navigator.clipboard.writeText(codeOutput.textContent).then(() => {
            const originalText = copyButton.textContent;
            copyButton.textContent = 'Copied!';
            setTimeout(() => { copyButton.textContent = originalText; }, 1500);
        });
    });

    // --- V. THEME MANAGEMENT ---
    
    function applyTheme(theme) {
        document.body.classList.toggle('dark-mode', theme === 'dark');
        themeToggle.checked = theme === 'dark';
    }
    
    themeToggle.addEventListener('change', () => {
        const newTheme = themeToggle.checked ? 'dark' : 'light';
        localStorage.setItem('theme', newTheme);
        applyTheme(newTheme);
    });

    // --- VI. INITIALIZATION ---

    // Create the preset buttons on load.
    for (const name in presets) {
        const button = document.createElement('button');
        button.textContent = name;
        button.dataset.preset = name;
        presetsContainer.appendChild(button);
    }

    // Check for saved theme preference.
    const savedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(savedTheme || (prefersDark ? 'dark' : 'light'));

    // Load the first preset by default.
    loadPreset(Object.keys(presets)[0]);

    </script>
</body>
</html>
